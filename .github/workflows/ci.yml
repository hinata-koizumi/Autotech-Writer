name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  go-checks:
    name: Go Lint and Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./go-collector
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go-collector/go.mod'
          cache-dependency-path: 'go-collector/go.sum'

      - name: Go Format
        run: if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then exit 1; fi

      - name: Go Vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: go-collector
          install-mode: goinstall

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

      - name: Go Test with Coverage
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Go Local Coverage Summary
        run: go tool cover -func=coverage.out

  python-checks:
    name: Python Lint, Type Check and Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./python-llm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'python-llm/requirements.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 black mypy pytest-cov

      - name: Run Flake8
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run Black
        run: black --check .

      - name: Run Mypy
        run: mypy . || echo "Mypy failed, check types" # Keep as warning for now if codebase is not fully typed

      - name: Run Pytest with Coverage
        run: python -m pytest tests/ -v --cov=. --cov-report=term-missing

  integration-tests:
    name: E2E Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run E2E Test Workflow
        run: bash tests/e2e/test_flow.sh
